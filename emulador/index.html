<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emulador GBA</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  margin-top: 30px;
}

#telaJogo {
  width: 480px;
  max-width: 90%;
  image-rendering: pixelated;
  background: black;
  border: 3px solid white;
  border-radius: 10px;
  margin: 30px auto;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 8px;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>🎮 Emulador GBA</h1>

<div id="game"></div>

<input type="file" id="arquivoJogo" accept=".gba">
  
<script>
EJS_player = "#game";
EJS_core = "gba";
EJS_pathtodata = "data/";
</script>

<script src="data/loader.js"></script>  
</body>
</html>
